services:
  semantic-search:
    build: .
    container_name: semantic-search-engine
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATA_PATH=data/data.csv
    volumes:
      - /Test-assignment-for-students/data
      - /Test-assignment-for-students/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s